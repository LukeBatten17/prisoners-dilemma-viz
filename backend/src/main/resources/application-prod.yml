spring:
  docker:
    compose:
      enabled: false
  datasource:
    username: ${Postgres.PGUSER}
    password: ${Postgres.PGPASSWORD}
    url: jdbc:postgresql://${Postgres.PGHOST}:${Postgres.PGPORT}/${Postgres.PGDATABASE}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

project:
  images: images/
